version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: grid07_postgres
    environment:
      POSTGRES_DB: socialdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: grid07_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: